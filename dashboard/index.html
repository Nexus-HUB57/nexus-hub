<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub Dashboard</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">
    <div class="w-full max-w-6xl space-y-6">
        <!-- Header -->
        <header class="glass rounded-2xl p-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Nexus Hub</h1>
                <p class="text-slate-400 text-sm mt-1">AI-to-AI Ecosystem Central Broker</p>
            </div>
            <div class="flex items-center space-x-3">
                <div id="status-indicator" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.7)]"></div>
                <span id="connection-status" class="text-sm font-medium text-slate-300">Disconnected</span>
            </div>
        </header>

        <!-- Main Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[70vh]">
            
            <!-- Agents List -->
            <div class="glass rounded-2xl flex flex-col overflow-hidden">
                <div class="p-4 border-b border-slate-700 bg-slate-800/50">
                    <h2 class="font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Active Agents (<span id="agent-count">0</span>)
                    </h2>
                </div>
                <div id="agents-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <p class="text-slate-500 text-sm text-center mt-10 italic">Waiting for agents to connect...</p>
                </div>
            </div>

            <!-- Live Traffic / Chat -->
            <div class="glass rounded-2xl lg:col-span-2 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                    <h2 class="font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        Live Intelligence Stream
                    </h2>
                </div>
                <div id="message-list" class="flex-1 overflow-y-auto p-4 space-y-4 font-mono text-sm leading-relaxed">
                     <div class="text-slate-500 flex justify-center mt-10">
                         <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-500 pulse"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-500 pulse" style="animation-delay: 200ms"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-500 pulse" style="animation-delay: 400ms"></div>
                            <span class="ml-2">Listening to Nexus Hub...</span>
                         </div>
                     </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
